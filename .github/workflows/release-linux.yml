name: release-linux

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release-linux:
    name: Build GNU And MUSL Linux Binaries And Publish Release Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with Git LFS)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure LFS objects are present
        run: git lfs pull

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config perl make cmake build-essential

      - name: Build GNU glibc dynamic Linux binary
        run: cargo build --release --locked --no-default-features --target x86_64-unknown-linux-gnu

      - name: Build MUSL static Linux binary via Dockerfile
        shell: bash
        run: |
          set -euo pipefail

          docker build \
            --target builder \
            --build-arg CARGO_FEATURES="--locked --no-default-features" \
            -t memory-mcp-server-musl-builder:latest \
            .

          CONTAINER_ID="$(docker create memory-mcp-server-musl-builder:latest)"
          trap 'docker rm -f "$CONTAINER_ID" >/dev/null 2>&1 || true' EXIT

          mkdir -p target/x86_64-unknown-linux-musl/release
          docker cp \
            "$CONTAINER_ID":/usr/src/app/target/release/memory-mcp-server \
            target/x86_64-unknown-linux-musl/release/memory-mcp-server
          chmod +x target/x86_64-unknown-linux-musl/release/memory-mcp-server

      - name: Prepare release package
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          APP="memory-mcp-server"
          TARGET_GNU="x86_64-unknown-linux-gnu"
          TARGET_MUSL="x86_64-unknown-linux-musl"
          PKG_NAME_GNU="${APP}-${TAG}-${TARGET_GNU}"
          PKG_NAME_MUSL="${APP}-${TAG}-${TARGET_MUSL}"

          mkdir -p "dist/${PKG_NAME_GNU}" "dist/${PKG_NAME_MUSL}"

          cp "target/${TARGET_GNU}/release/${APP}" "dist/${PKG_NAME_GNU}/${APP}"
          cp LICENSE "dist/${PKG_NAME_GNU}/LICENSE"
          cp THIRD_PARTY_NOTICES.md "dist/${PKG_NAME_GNU}/THIRD_PARTY_NOTICES.md"
          cp README.md "dist/${PKG_NAME_GNU}/README.md"
          cp assets/all-MiniLM-L6-v2-LICENSE.txt "dist/${PKG_NAME_GNU}/all-MiniLM-L6-v2-LICENSE.txt"

          cp "target/${TARGET_MUSL}/release/${APP}" "dist/${PKG_NAME_MUSL}/${APP}"
          cp LICENSE "dist/${PKG_NAME_MUSL}/LICENSE"
          cp THIRD_PARTY_NOTICES.md "dist/${PKG_NAME_MUSL}/THIRD_PARTY_NOTICES.md"
          cp README.md "dist/${PKG_NAME_MUSL}/README.md"
          cp assets/all-MiniLM-L6-v2-LICENSE.txt "dist/${PKG_NAME_MUSL}/all-MiniLM-L6-v2-LICENSE.txt"

          tar -C dist -czf "dist/${PKG_NAME_GNU}.tar.gz" "${PKG_NAME_GNU}"
          sha256sum "dist/${PKG_NAME_GNU}.tar.gz" > "dist/${PKG_NAME_GNU}.tar.gz.sha256"

          tar -C dist -czf "dist/${PKG_NAME_MUSL}.tar.gz" "${PKG_NAME_MUSL}"
          sha256sum "dist/${PKG_NAME_MUSL}.tar.gz" > "dist/${PKG_NAME_MUSL}.tar.gz.sha256"

      - name: Publish release assets with gh CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.tar.gz dist/*.sha256 --clobber
          else
            gh release create "$TAG" dist/*.tar.gz dist/*.sha256 \
              --title "$TAG" \
              --notes-file CHANGELOG.md
          fi
